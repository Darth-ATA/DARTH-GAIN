<form class="config-form"
      hx-put="/exercises/{{ config.exercise_template_id }}/config"
      hx-target="#config-editor"
      hx-swap="innerHTML"
      hx-indicator="#config-spinner">
    <div class="config-fields">
        <div class="form-group">
            <label for="rep_min">Rep Min</label>
            <input type="number" id="rep_min" name="rep_min"
                   min="1" max="99"
                   value="{{ config.rep_min }}" required>
        </div>
        <div class="form-group">
            <label for="rep_max">Rep Max</label>
            <input type="number" id="rep_max" name="rep_max"
                   min="1" max="99"
                   value="{{ config.rep_max }}" required>
        </div>
        <div class="form-group">
            <label for="weight_increment">Increment (kg)</label>
            <input type="number" id="weight_increment" name="weight_increment"
                   min="0.5" step="0.5"
                   value="{{ config.weight_increment }}" required>
        </div>
        <div class="form-group form-group-checkbox">
            <label class="checkbox-label">
                <input type="checkbox" id="enabled" name="enabled"
                       value="True"
                       {% if config.enabled %}checked{% endif %}>
                <span>Progression enabled</span>
            </label>
        </div>
    </div>
    <div class="config-actions">
        <button type="submit" class="btn btn-primary btn-sm">
            Save Config
        </button>
        <div id="config-spinner" class="htmx-indicator">
            <span class="spinner"></span> Saving...
        </div>
    </div>
</form>
