services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      # Override with a strong secret in production
      DARTH_GAIN_SECRET: "${DARTH_GAIN_SECRET:-dev-secret}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
